<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto&family=Pacifico&family=Space+Mono&family=Merriweather&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a1a1a;
      --text-color: #ffffff;
      --border-color: #444;
    }
    body.light-mode {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border-color: #ccc;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }
    .controls {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
      padding: 12px;
      background-color: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }
    body.light-mode .controls {
      background-color: rgba(0, 0, 0, 0.05);
    }
    .control-row { display: flex; align-items: center; gap: 12px; }
    select {
      padding: 6px 10px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      cursor: pointer;
    }
    .toggle-btn {
      padding: 6px 12px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .toggle-btn:hover {
      opacity: 0.8;
    }
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    h1 {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <h1 id="text">Hello World</h1>
  <div class="controls">
    <div class="control-row">
      <span>A</span>
      <input type="range" id="slider" min="12" max="200" value="80">
      <span style="font-size: 2em;">A</span>
    </div>
    <div class="control-row">
      <select id="fontPicker">
        <option value="Roboto">Roboto</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Pacifico">Pacifico</option>
        <option value="Space Mono" selected>Space Mono</option>
        <option value="Merriweather">Merriweather</option>
      </select>
    </div>
    <div class="control-row">
      <button id="themeToggle" class="toggle-btn">🌙 Dark Mode</button>
    </div>
  </div>
  <script>
    const text = document.getElementById('text');
    const slider = document.getElementById('slider');
    const fontPicker = document.getElementById('fontPicker');
    const themeToggle = document.getElementById('themeToggle');
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;
    const repelDistance = 150;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.2;
        this.vy = (Math.random() - 0.5) * 0.2;
        this.size = Math.random() * 2 + 1;
        this.angle = Math.random() * Math.PI * 2;
      }

      update() {
        this.angle += 0.01;
        const swirl = Math.sin(this.angle) * 0.05;
        this.vx += swirl;
        this.vy += Math.cos(this.angle) * 0.03;

        this.vx *= 0.98;
        this.vy *= 0.98;

        this.x += this.vx;
        this.y += this.vy;

        const textRect = text.getBoundingClientRect();
        const dx = this.x - (textRect.left + textRect.width / 2);
        const dy = this.y - (textRect.top + textRect.height / 2);
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < repelDistance) {
          const force = (repelDistance - distance) / repelDistance;
          const angle = Math.atan2(dy, dx);
          this.vx += Math.cos(angle) * force * 0.3;
          this.vy += Math.sin(angle) * force * 0.3;
        }

        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }

      draw() {
        ctx.fillStyle = document.body.classList.contains('light-mode')
          ? `rgba(100, 100, 100, 0.6)`
          : `rgba(200, 200, 200, 0.6)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles.length = 0;
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      requestAnimationFrame(animate);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.classList.toggle('light-mode', savedTheme === 'light');
    updateThemeButton();

    text.style.fontSize = slider.value + 'px';
    text.style.fontFamily = fontPicker.value;
    slider.addEventListener('input', () => {
      text.style.fontSize = slider.value + 'px';
    });
    fontPicker.addEventListener('change', () => text.style.fontFamily = fontPicker.value);

    function updateThemeButton() {
      const isLight = document.body.classList.contains('light-mode');
      themeToggle.textContent = isLight ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const newTheme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
      localStorage.setItem('theme', newTheme);
      updateThemeButton();
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animate();
  </script>
</body>
</html>
